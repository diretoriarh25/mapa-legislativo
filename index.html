<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Legislativo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.popup{
    width:260px;
}

.popup img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
    margin-bottom:10px;
    border:3px solid #0d6efd;
}

.popup h3{
    font-size:16px;
    margin-bottom:10px;
    text-align:center;
}

.popup p{
    margin:5px 0;
    font-size:14px;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    margin-top:12px;
    padding:10px;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    border-radius:5px;
    box-sizing:border-box;
}

.marker-photo{
    width:45px;
    height:45px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid white;
    box-shadow:0 0 5px rgba(0,0,0,0.5);
}

.marker-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([-12.191, -42.896], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

const markers = L.markerClusterGroup();

fetch('dados.json')

.then(response => response.json())

.then(data => {

    data.forEach(item => {

        const icon = L.divIcon({

            html: `
                <div class="marker-photo">
                    <img src="${item.Foto}">
                </div>
            `,

            className: '',
            iconSize: [45,45]

        });

        const marker = L.marker(
            [
                item.Latitude,
                item.Longitude
            ],
            {
                icon: icon
            }
        );

        const popup = `

            <div class="popup">

                <img src="${item.Foto}">

                <h3>
                    ${item.Tipo_Materia}
                    Nº ${item.ID_Indicacao}/${item.Ano}
                </h3>

                <p>
                    <strong>Vereador:</strong>
                    ${item.Vereador}
                </p>

                <p>
                    <strong>Data:</strong>
                    ${item.Data}
                </p>

                <p>
                    <strong>Local:</strong>
                    ${item.Bairro_Localidade}
                </p>

                <p>
                    <strong>Status:</strong>
                    ${item.Status}
                </p>

                <p>
                    ${item.Descricao_Indicacao}
                </p>

                <a
                    class="btn"
                    target="_blank"
                    href="${item.Link_Indicacao_Portal}"
                >
                    Mais Informações
                </a>

            </div>

        `;

        marker.bindPopup(popup);

        markers.addLayer(marker);

    });

    map.addLayer(markers);

})

.catch(error => {

    console.error('Erro ao carregar dados.json:', error);

    alert('Erro ao carregar o arquivo dados.json');

});

</script>

</body>
</html>
