<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Legislativo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

#map{
width:100%;
height:100vh;
}

.popup{
width:250px;
}

.popup img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:5px;
}

.marker-photo{
width:45px;
height:45px;
border-radius:50%;
overflow:hidden;
border:3px solid white;
}

.marker-photo img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([-12.191, -42.896], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

const markers = L.markerClusterGroup();

fetch('dados.json')
.then(response => response.json())
.then(data => {

    data.forEach(item => {

        const icon = L.divIcon({
            html: `
                <div class="marker-photo">
                    <img src="${item.Foto}">
                </div>
            `,
            className: '',
            iconSize: [45, 45]
        });

        const marker = L.marker([
            item.Latitude,
            item.Longitude
        ], {
            icon: icon
        });

        const popup = `
            <div class="popup">
                <img src="${item.Foto}">

                <h3>${item.Tipo_Materia} Nº ${item.ID_Indicacao}/${item.Ano}</h3>

                <p><strong>Vereador:</strong> ${item.Vereador}</p>
                <p><strong>Data:</strong> ${item.Data}</p>
                <p><strong>Bairro:</strong> ${item.Bairro_Localidade}</p>
                <p><strong>Status:</strong> ${item.Status}</p>

                <p>${item.Descricao_Indicacao}</p>

                <a class="btn" target="_blank" href="${item.Link_Indicacao_Portal}">
                    Mais Informações
                </a>
            </div>
        `;

        marker.bindPopup(popup);

        markers.addLayer(marker);

    });

    map.addLayer(markers);

});

</script>

</body>
</html>
